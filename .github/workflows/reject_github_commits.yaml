---

name: Reject GitHub signed commits
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  github-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Ensure no commits are signed by GitHub
        shell: bash {0}
        run: |
          dependabot=($(git rev-list --no-merges --author="dependabot" origin/${GITHUB_BASE_REF}..${{ github.sha }}))

          git rev-list --no-merges origin/${GITHUB_BASE_REF}..${{ github.sha }} | while read -r commit; do
              echo "checking $commit"
              if printf "%s\n" "${dependabot[@]}"  | grep -qxF -- "$commit"; then
                  echo "skipping dependabot commit"
                  continue
              fi

              if (git verify-commit -v --raw $commit || true) 2>&1 | grep -q B5690EEEBB952194; then
                  echo "Please squash GitHub commit $commit into the respective change."; exit 1;
              fi
          done
